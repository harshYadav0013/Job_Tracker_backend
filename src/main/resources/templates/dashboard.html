<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Welcome, <span th:text="${userName}">User</span>! 👋</h2>

<hr>

<h3>📊 Your Job Search Stats</h3>

<table border="1" cellpadding="12">
    <tr>
        <th>Total Applied</th>
        <th>Interviews</th>
        <th>Offers</th>
        <th>Rejections</th>
    </tr>
    <tr>
        <td align="center" th:text="${total}">0</td>
        <td align="center" th:text="${interview}">0</td>
        <td align="center" th:text="${offer}">0</td>
        <td align="center" th:text="${rejected}">0</td>
    </tr>
</table>

<hr>

<h3>🔗 Quick Links</h3>
<a href="/jobs">📋 View All Applications</a><br><br>
<a href="/jobs/add">➕ Add New Application</a><br><br>
<a href="/jobs?status=INTERVIEW">🗓 View Interviews</a><br><br>
<a href="/jobs?status=OFFER">🎉 View Offers</a><br><br>

<hr>

<form th:action="@{/logout}" method="post">
    <button type="submit">🚪 Logout</button>
</form>

</body>
</html>
