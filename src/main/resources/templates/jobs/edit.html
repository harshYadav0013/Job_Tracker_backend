<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Job Application</title>
</head>
<body>

<h2>Edit Job Application</h2>

<form th:action="@{/jobs/edit/{id}(id=${job.id})}" method="post">

    <label>Company Name</label><br>
    <input type="text" name="companyName"
           th:value="${job.companyName}" required><br><br>

    <label>Role</label><br>
    <input type="text" name="role"
           th:value="${job.role}" required><br><br>

    <label>Location</label><br>
    <input type="text" name="location"
           th:value="${job.location}"><br><br>

    <label>Date Applied</label><br>
    <input type="date" name="appliedDate"
           th:value="${job.appliedDate}" required><br><br>

    <label>Status</label><br>
    <select name="status">
        <option th:each="s : ${statuses}"
                th:value="${s}"
                th:text="${s}"
                th:selected="${s == job.status}">
        </option>
    </select><br><br>

    <label>Notes</label><br>
    <textarea name="notes" rows="4" cols="40"
              th:text="${job.notes}"></textarea><br><br>

    <button type="submit">Update Application</button>
    <a href="/jobs">Cancel</a>

</form>

</body>
</html>
